syntax = "proto3";

package VitalOSProtocol;

// --- Java Code Generation Options ---
option java_package = "co.vitalist.protocol";
option java_outer_classname = "VitalOSProtocolMessaging";
option java_multiple_files = false;

option optimize_for = LITE_RUNTIME;

// Import the new structured local message definitions.
import "local_messages.proto";

// ===================================================================
// == Common Message Structures
// ===================================================================

// Represents a standard REST API call.
message RestMessage {
  enum Method {
    GET = 0;
    POST = 1;
    PUT = 2;
    DELETE = 3;
    PATCH = 4;
  }
  Method method = 1;
  string url = 2;
  map<string, string> headers = 3;
  map<string, string> body = 4;
  bool use_app_auth = 5;
}

// Represents a local action on the phone.
// This now contains a structured request instead of generic fields.
message LocalMessage {
  LocalRequest request = 1;
}

// Raw data message
message RawMessage {
  string message_key = 1;
  bytes payload = 2;
}

// ===================================================================
// == Phone -> Watch
// ===================================================================

// A request initiated by the phone app to the watch app.
message PhoneRequest {
  string request_id = 1;
  string endpoint = 2;
  bytes payload = 3;
}

// A response from the watch back to the phone.
message WatchResponse {
  string original_request_id = 1;
  bool success = 2;
  bytes payload = 3;
}

// ===================================================================
// == Watch -> Phone
// ===================================================================

// A request initiated by the watch app to the phone app.
message WatchRequest {
  string request_id = 1;
  oneof request_type {
    LocalMessage local = 3;
    RestMessage rest = 4;
    RawMessage raw = 5;
  }
}


/// Contains the metadata for a large payload that will be sent via a stream.
/// The device receives this, prepares for the stream, and sends back an ACK.
/// The app then initiates the stream using the standard streaming commands.
message StreamedPayloadInfo {
  int32 stream_id = 1;
  int64 total_size = 2;
  
  // File path where streamed data was written (watch-side)
  // Present in final response after stream completes
  string file_path = 3;
  
  // Content type of the response (e.g., "application/json", "image/jpeg")
  string content_type = 4;
  
  // Original HTTP status code from the API response
  int32 http_status_code = 5;
  
  // Response headers for metadata (optional)
  map<string, string> response_headers = 6;
}

/// to a WatchRequest.
message PhoneResponse {
  // The ID from the original WatchRequest this is responding to.
  string original_request_id = 1;

  // Standard status fields.
  bool success = 2;
  int32 error_code = 3; // Corresponds to your ErrorCode enum
  string error_message = 4;

  // The payload of the response. It will be one of these two types.
  oneof payload {
    // For small responses, the data is sent directly.
    bytes direct_payload = 10;

    // For large responses, this provides the metadata for an upcoming stream.
    StreamedPayloadInfo streamed_payload = 11;

    LocalResponse local_response = 12;
  }
}

