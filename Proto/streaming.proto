syntax = "proto3";

package VitalOSProtocol;

option java_package = "co.vitalist.protocol";
option java_outer_classname = "VitalOSProtocolStreaming";
option java_multiple_files = false;
option optimize_for = LITE_RUNTIME;


// ===================================================================
// == Streaming Messages
// ===================================================================

// Initiates a stream.
message StartStream {
  int32 stream_id = 1;
  int64 total_size = 2;
  // Additional context for the stream, parsed based on the specific Start Command used.
  bytes context = 3;
}

// Context for API/REST streaming requests (Watch -> App)
message StreamApiRequestContext {
  string request_id = 1;
  string method = 2;  // GET, POST, PUT, DELETE, etc.
  string url = 3;
  map<string, string> headers = 4;
  map<string, string> query_params = 5;
  bool use_app_auth = 6;
  // The actual request body will be streamed via StreamDataChunk messages
}

// Context for streaming API response data back to watch (App -> Watch)
message StreamApiResponseContext {
  string request_id = 1;           // Original request ID being responded to
  int32 http_status_code = 2;      // HTTP response status (200, 404, etc.)
  string content_type = 3;         // Content-Type header value
  map<string, string> headers = 4; // Other response headers (optional)
  string suggested_file_name = 5;  // Suggested name for the file (optional)
  // The actual response body will be streamed via StreamDataChunk messages
}

// message StartStreamResponse {
//   int32 stream_id = 1;
//   int32 batch_size = 2;
// }

// A wrapper for a chunk of data for a stream.
message StreamDataChunk {
  int32 stream_id = 1;
  int32 sequence_number = 2;
  bytes data = 3;
}

message StreamDataChunkAck {
  int32 stream_id = 1;
  int32 sequence_number = 2;
}

// A message to signal the end of a stream and provide the final checksum.
message EndStream {
    int32 stream_id = 1;
    uint32 checksum = 2;
}

// An enum for standardized reasons a stream might be canceled.
enum CancelReason {
  REASON_UNKNOWN = 0;
  USER_CANCELED = 1; // The user explicitly canceled the operation.
  TIMEOUT = 2;       // The operation timed out.
  STREAM_INTERNAL_ERROR = 3;  // An unexpected error occurred.
  DISCONNECTED = 4;    // The BLE connection was lost.
}

// A command to cancel an in-progress data stream.
message CancelStream {
  int32 stream_id = 1;
  CancelReason reason_code = 2;
  string reason_message = 3;
}
